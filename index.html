<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学トレーニング・ダッシュボード</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .dashboard { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; text-align: center; margin-bottom: 25px; color: #111; }
        h2 { font-size: 18px; margin-top: 30px; border-left: 4px solid #007aff; padding-left: 8px; color: #444; }
        
        /* 📝 問題リストのスタイル */
        .problem-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .problem-item { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: #f8f9fa; border-radius: 10px; border: 1px solid #eee; transition: background 0.2s; }
        .problem-item:hover { background: #f1f3f5; }
        .problem-info { display: flex; align-items: center; gap: 12px; cursor: pointer; flex: 1; }
        .problem-checkbox { width: 18px; height: 18px; cursor: pointer; }
        .problem-title { font-weight: bold; font-size: 16px; }
        .tag { font-size: 12px; background: #007aff; color: white; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
        
        /* 🚀 プレイボタン */
        .btn-play { background: #34c759; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-play:hover { background: #28a745; }
        
        /* ⚙️ カスタムコース作成エリア */
        .custom-box { background: #f0f4f8; padding: 15px; border-radius: 12px; border: 1px solid #dce4ec; margin-top: 15px; }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        .btn-save { background: #007aff; color: white; border: none; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* 💾 保存されたコースリスト */
        .course-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .course-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border: 1px solid #e0e0e0; border-radius: 8px; }
        .course-name { font-weight: bold; color: #333; }
        .btn-course-play { background: #ff9500; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #ff3b30; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>📐 数学トレーニング</h1>

    <!-- 1️⃣ 問題の一覧（上から羅列） -->
    <h2>単体で遊ぶ / 組み合わせを選ぶ</h2>
    <div class="problem-list" id="master-problem-list">
        <!-- JavaScriptで自動生成されます -->
    </div>

    <!-- 2️⃣ 選択した組み合わせを保存するエリア -->
    <div class="custom-box">
        <span style="font-weight: bold; font-size: 14px; color: #555;">💡 チェックした問題をセットとして保存する</span>
        <div class="input-group">
            <input type="text" id="course-name-input" placeholder="例: 毎日のウォーミングアップ設定">
            <button class="btn-save" onclick="saveCustomCourse()">⭐ 組み合わせを保存</button>
        </div>
    </div>

    <!-- 3️⃣ 保存されたお気に入り組み合わせリスト -->
    <h2>💾 マイカスタムコース</h2>
    <div class="course-list" id="saved-course-list">
        <!-- 保存されたコースがここに並びます -->
    </div>
</div>

<script>
    // ==========================================
    // 🛠️ 問題のデータベース（新しい問題はここに追加！）
    // ==========================================
    const questionDatabase = [
        { id: "eq", filename: "problems/equations.html", title: "連立方程式・最速暗算ノック", tag: "方程式" },
        
        // 今後新しい子プログラムを追加するときはここを増やすだけで自動的に選択画面に対応します
    ];

    // 画面起動時にリストを描画
    function renderDashboard() {
        const pList = document.getElementById('master-problem-list');
        pList.innerHTML = '';

        questionDatabase.forEach(prob => {
            const item = document.createElement('div');
            item.className = 'problem-item';
            item.innerHTML = `
                <div class="problem-info">
                    <input type="checkbox" class="problem-checkbox" value="${prob.id}" id="chk-${prob.id}">
                    <label for="chk-${prob.id}" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
                        <span class="tag">${prob.tag}</span>
                        <span class="problem-title">${prob.title}</span>
                    </label>
                </div>
                <a class="btn-play" href="${prob.filename}">単体プレイ</a>
            `;
            pList.appendChild(item);
        });

        loadCustomCourses();
    }

    // --- 💾 組み合わせの保存機能 ---
    function saveCustomCourse() {
        const nameInput = document.getElementById('course-name-input');
        const courseName = nameInput.value.trim();
        if (!courseName) {
            alert("コースの名前を入力してください！");
            return;
        }

        // チェックされている問題のIDを回収
        const checkedIds = [];
        questionDatabase.forEach(prob => {
            if (document.getElementById(`chk-${prob.id}`).checked) {
                checkedIds.push(prob.id);
            }
        });

        if (checkedIds.length === 0) {
            alert("組み合わせる問題を少なくとも1つチェックしてください！");
            return;
        }

        // LocalStorageに保存
        let savedCourses = JSON.parse(localStorage.getItem('math_custom_courses') || '[]');
        savedCourses.push({ name: courseName, problems: checkedIds });
        localStorage.setItem('math_custom_courses', JSON.stringify(savedCourses));

        // 入力をリセットして再描画
        nameInput.value = '';
        // チェックボックスも外す
        questionDatabase.forEach(prob => document.getElementById(`chk-${prob.id}`).checked = false);
        
        loadCustomCourses();
    }

    // --- 📂 保存されたコースの読み込み表示 ---
    function loadCustomCourses() {
        const container = document.getElementById('saved-course-list');
        container.innerHTML = '';
        const savedCourses = JSON.parse(localStorage.getItem('math_custom_courses') || '[]');

        if (savedCourses.length === 0) {
            container.innerHTML = '<p style="color:#aaa; font-size:14px; text-align:center;">保存されたカスタムコースはまだありません</p>';
            return;
        }

        savedCourses.forEach((course, index) => {
            // 含まれるタグの文字列を生成
            const tagNames = course.problems.map(id => {
                const found = questionDatabase.find(p => p.id === id);
                return found ? `[${found.tag}]` : '';
            }).join(' ');

            const item = document.createElement('div');
            item.className = 'course-item';
            item.innerHTML = `
                <div>
                    <div class="course-name">${course.name}</div>
                    <div style="font-size:12px; color:#666; margin-top:4px;">構成: ${tagNames}</div>
                </div>
                <div>
                    <button class="btn-course-play" onclick="playCustomCourse(${index})">コース開始</button>
                    <button class="btn-delete" onclick="deleteCourse(${index})">削除</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    // --- 🚀 カスタムコースの連続プレイ機能 ---
    function playCustomCourse(index) {
        const savedCourses = JSON.parse(localStorage.getItem('math_custom_courses') || '[]');
        const course = savedCourses[index];
        
        if (!course || course.problems.length === 0) return;

        // 選ばれた問題の一覧から、最初の問題のURLを取得してジャンプする
        // ※発展形として、クエリパラメータを使って「コースプレイ中フラグ」を子に渡すことも可能です。
        const firstProbId = course.problems[0];
        const foundProb = questionDatabase.find(p => p.id === firstProbId);
        
        if (foundProb) {
            alert(`「${course.name}」を開始します！\nまずは最初の問題【${foundProb.title}】へ移動します。`);
            location.href = foundProb.filename;
        }
    }

    // --- ❌ コースの削除 ---
    function deleteCourse(index) {
        if(!confirm("このカスタムコースを削除してよろしいですか？")) return;
        let savedCourses = JSON.parse(localStorage.getItem('math_custom_courses') || '[]');
        savedCourses.splice(index, 1);
        localStorage.setItem('math_custom_courses', JSON.stringify(savedCourses));
        loadCustomCourses();
    }

    // 起動
    renderDashboard();
</script>
</body>
</html>
