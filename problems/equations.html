<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連立方程式・最速暗算ノック（バグ修正版）</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; box-sizing: border-box; }
        h1 { font-size: 20px; color: #1a1a1a; margin-top: 0; text-align: center; }
        .config-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .config-item { display: flex; flex-direction: column; gap: 6px; }
        label { font-weight: bold; color: #4a4a4a; font-size: 14px; }
        select, input[type="range"] { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; width: 100%; box-sizing: border-box; }
        .range-value { font-weight: bold; color: #007aff; text-align: right; margin-top: -4px; }
        .preset-container { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
        .btn-preset { background: #e4e6eb; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .btn-save { background: #34c759 !important; color: white; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-start { background-color: #007aff; color: white; }
        .btn-action { background-color: #34c759; color: white; margin-top: 15px; }
        .hidden { display: none !important; }
        .game-status { display: flex; justify-content: space-between; color: #666; font-size: 14px; margin-bottom: 15px; }
        .equation-box { font-size: 28px; font-weight: bold; text-align: center; margin: 20px 0; line-height: 1.6; color: #2c3e50; background: #f8f9fa; padding: 20px; border-radius: 12px; }
        .input-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .answer-field { flex: 1; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1️⃣ 設定画面 -->
    <div id="panel-config">
        <h1>連立方程式ノック 設定</h1>
        <div class="config-section">
            <div class="config-item">
                <label for="config-count">問題数</label>
                <select id="config-count">
                    <option value="10" selected>10問</option>
                    <option value="20">20問</option>
                    <option value="50">50問</option>
                    <option value="100">100問</option>
                </select>
            </div>
            <div class="config-item">
                <label for="config-complexity">問題の複雑さ (レベル1〜5)</label>
                <input type="range" id="config-complexity" min="1" max="5" value="2">
                <div class="range-value" id="complexity-display">レベル 2</div>
            </div>
            <div class="config-item">
                <label>マイお気に入り設定</label>
                <div class="preset-container" id="preset-list"></div>
                <div class="preset-container" style="margin-top: 10px;">
                    <button class="btn-preset btn-save" onclick="saveCurrentPreset()">⭐ 現在の設定を保存</button>
                </div>
            </div>
        </div>
        <button class="btn-main btn-start" onclick="startGame()">スタート！</button>
    </div>

    <!-- 2️⃣ プレイ画面 -->
    <div id="panel-game" class="hidden">
        <div class="game-status">
            <span id="progress-text">第 1 / 10 問</span>
            <span>親画面でタイム計測中</span>
        </div>
        <div class="equation-box" id="equation-display">読み込み中...</div>
        <div class="input-group">
            <div class="answer-field">
                <label for="ans-x">x =</label>
                <input type="number" id="ans-x" placeholder="x" style="width:100%; padding:10px; font-size:18px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;">
            </div>
            <div class="answer-field">
                <label for="ans-y">y =</label>
                <input type="number" id="ans-y" placeholder="y" style="width:100%; padding:10px; font-size:18px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;">
            </div>
        </div>
        <button class="btn-main btn-action" onclick="checkAnswer()">決定 (Enter)</button>
    </div>
</div>

<script>
    let totalQuestions = 10;
    let complexity = 2;
    let currentQuestionIndex = 1;
    let correctX = 0, correctY = 0;

    function generateProblem(level) {
        let x, y, a, b, d, e;
        const lvl = parseInt(level, 10);

        // クソ問題回避ループ（上下の式が同じ割合、または解がない状態を回避）
        while (true) {
            if (lvl === 1) {
                // レベル1：x, yは1〜5の正の数。係数は1か2。
                x = Math.floor(Math.random() * 5) + 1;
                y = Math.floor(Math.random() * 5) + 1;
                a = Math.floor(Math.random() * 2) + 1; // 1か2
                b = Math.floor(Math.random() * 2) + 1; // 1か2
                d = Math.floor(Math.random() * 2) + 1; // 1か2
                e = Math.floor(Math.random() * 2) + 1; // 1か2
            } else if (lvl === 2) {
                x = Math.floor(Math.random() * 8) - 4; if(x>=0) x++;
                y = Math.floor(Math.random() * 4) + 1;
                a = Math.floor(Math.random() * 3) + 1; b = Math.floor(Math.random() * 3) + 1;
                d = Math.floor(Math.random() * 2) + 1; e = -1;
            } else if (lvl === 3) {
                x = Math.floor(Math.random() * 10) - 5; if(x===0) x=2;
                y = Math.floor(Math.random() * 10) - 5; if(y===0) y=3;
                a = Math.floor(Math.random() * 4) + 2; b = Math.floor(Math.random() * 4) - 2; if(b===0) b=1;
                d = Math.floor(Math.random() * 3) + 1; e = Math.floor(Math.random() * 4) + 2;
            } else if (lvl === 4) {
                x = Math.floor(Math.random() * 16) - 8; if(x===0) x=3;
                y = Math.floor(Math.random() * 16) - 8; if(y===0) y=4;
                a = Math.floor(Math.random() * 8) + 3; b = Math.floor(Math.random() * 8) - 4; if(b===0) b=2;
                d = Math.floor(Math.random() * 6) + 2; e = Math.floor(Math.random() * 6) + 2;
            } else {
                x = Math.floor(Math.random() * 20) - 10; if(x===0) x=5;
                y = Math.floor(Math.random() * 20) - 10; if(y===0) y=5;
                a = Math.floor(Math.random() * 5) + 5; b = Math.floor(Math.random() * 4) + 2; 
                d = Math.floor(Math.random() * 4) + 2; e = Math.floor(Math.random() * 5) + 5; 
            }

            // ⭐ 行列式 (ad - bc) が 0 でないかチェック（0だと上下の比率が同じになり破綻する）
            if ((a * e - b * d) !== 0) {
                break; // 健全な問題ならループを抜ける
            }
        }

        let c = a * x + b * y;
        let f = d * x + e * y;

        let eq1 = `${a}x ${b >= 0 ? '+ ' + b : '- ' + Math.abs(b)}y = ${c}`;
        let eq2 = `${d}x ${e >= 0 ? '+ ' + e : '- ' + Math.abs(e)}y = ${f}`;
        
        eq1 = eq1.replace(/^1x/, 'x').replace(/ 1y/, ' y').replace(/-1y/, '-y');
        eq2 = eq2.replace(/^1x/, 'x').replace(/ 1y/, ' y').replace(/-1y/, '-y');

        correctX = x;
        correctY = y;

        document.getElementById('equation-display').innerHTML = `${eq1}<br>${eq2}`;
    }

    const complexityInput = document.getElementById('config-complexity');
    const complexityDisplay = document.getElementById('complexity-display');
    complexityInput.addEventListener('input', (e) => { complexityDisplay.innerText = `レベル ${e.target.value}`; });

    function saveCurrentPreset() {
        const count = document.getElementById('config-count').value;
        const comp = complexityInput.value;
        const name = prompt("お気に入り設定の名前:", `${count}問 / Lv.${comp}`);
        if (!name) return;
        let presets = JSON.parse(localStorage.getItem('math_presets') || '[]');
        presets.push({ name: name, count: parseInt(count, 10), complexity: parseInt(comp, 10) });
        localStorage.setItem('math_presets', JSON.stringify(presets));
        loadPresets();
    }

    function loadPresets() {
        const container = document.getElementById('preset-list'); container.innerHTML = '';
        let presets = JSON.parse(localStorage.getItem('math_presets') || '[]');
        if (presets.length === 0) {
            presets = [
                { name: "定番10問 (Lv.2)", count: 10, complexity: 2 },
                { name: "ガッツリ20問 (Lv.3)", count: 20, complexity: 3 }
            ];
        }
        presets.forEach((p) => {
            const btn = document.createElement('button'); btn.className = 'btn-preset'; btn.innerText = p.name;
            btn.onclick = () => { document.getElementById('config-count').value = p.count; complexityInput.value = p.complexity; complexityDisplay.innerText = `レベル ${p.complexity}`; };
            container.appendChild(btn);
        });
    }

    function showConfig() {
        document.getElementById('panel-config').classList.remove('hidden');
        document.getElementById('panel-game').classList.add('hidden');
        loadPresets();
    }

    function startGame() {
        totalQuestions = parseInt(document.getElementById('config-count').value, 10);
        complexity = parseInt(complexityInput.value, 10);
        currentQuestionIndex = 1;
        document.getElementById('panel-config').classList.add('hidden');
        document.getElementById('panel-game').classList.remove('hidden');
        nextQuestion();
    }

    function nextQuestion() {
        document.getElementById('progress-text').innerText = `第 ${currentQuestionIndex} / ${totalQuestions} 問`;
        document.getElementById('ans-x').value = ''; document.getElementById('ans-y').value = '';
        document.getElementById('ans-x').focus();
        generateProblem(complexity);
    }

    function checkAnswer() {
        if(document.getElementById('ans-x').value === "" || document.getElementById('ans-y').value === "") return;
        const userX = parseInt(document.getElementById('ans-x').value, 10);
        const userY = parseInt(document.getElementById('ans-y').value, 10);

        if (userX === correctX && userY === correctY) {
            if (currentQuestionIndex < totalQuestions) {
                currentQuestionIndex++;
                nextQuestion();
            } else {
                window.parent.postMessage('GAME_CLEAR', '*');
            }
        } else {
            alert("答えが違います！もう一度計算してみてね。");
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !document.getElementById('panel-game').classList.contains('hidden')) {
            checkAnswer();
        }
    });

    showConfig();
</script>
</body>
</html>
